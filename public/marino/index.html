<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OG Plus — Orton-Gillingham Digital Platform</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222633;
    --accent: #6c63ff;
    --accent-light: #8b83ff;
    --green: #34d399;
    --green-dark: #059669;
    --orange: #fb923c;
    --red: #f87171;
    --blue: #60a5fa;
    --yellow: #fbbf24;
    --pink: #f472b6;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --border: #2d3148;
    --radius: 12px;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar h1 { font-size: 1.3rem; font-weight: 800; }
  .topbar h1 span { color: var(--accent); }
  .topbar .nav-links { display: flex; gap: 8px; }
  .topbar .nav-links button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .topbar .nav-links button:hover,
  .topbar .nav-links button.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

  .dashboard-header { margin-bottom: 32px; }
  .dashboard-header h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
  .dashboard-header p { color: var(--text-dim); font-size: 0.95rem; }

  .progress-bar-container {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 32px;
    border: 1px solid var(--border);
  }
  .progress-bar-container .label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .progress-bar-container .label span:last-child { color: var(--accent); }
  .progress-track {
    width: 100%;
    height: 10px;
    background: var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 5px;
    transition: width 0.5s ease;
  }

  .lessons-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .lesson-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .lesson-card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .lesson-card .lesson-num {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .lesson-card .phoneme { font-size: 2rem; font-weight: 800; margin-bottom: 4px; }
  .lesson-card .phoneme-label { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 12px; }
  .lesson-card .words-preview { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; }
  .lesson-card .status-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
  }
  .lesson-card .status-badge.complete { background: var(--green-dark); color: white; }

  .lesson-view { display: none; }
  .lesson-view.active { display: block; }
  .dashboard-view.active { display: block; }
  .dashboard-view { display: none; }

  .back-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .lesson-title-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .lesson-title-bar .big-phoneme {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 800;
    color: white;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .lesson-title-bar .big-phoneme:hover { transform: scale(1.1); }
  .lesson-title-bar h2 { font-size: 1.5rem; font-weight: 800; }
  .lesson-title-bar p { color: var(--text-dim); font-size: 0.9rem; }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--card);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }
  .tabs button {
    flex: 1;
    padding: 10px 16px;
    border: none;
    background: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tabs button.active { background: var(--accent); color: white; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* LEARN TAB */
  .learn-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .learn-section h3 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .learn-section h3 .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .sound-display {
    text-align: center;
    padding: 32px;
    background: linear-gradient(135deg, #1e2235, #252a3f);
    border-radius: var(--radius);
    margin-bottom: 16px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .sound-display:hover { transform: scale(1.02); }
  .sound-display:active { transform: scale(0.98); }
  .sound-display .letter { font-size: 6rem; font-weight: 800; color: var(--accent-light); line-height: 1; }
  .sound-display .sound-label { font-size: 1.2rem; color: var(--text-dim); margin-top: 8px; }
  .sound-display .tap-hint { font-size: 0.75rem; color: var(--text-dim); margin-top: 12px; opacity: 0.6; }

  .speaker-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(108,99,255,0.2);
    color: var(--accent-light);
    font-size: 0.8rem;
    cursor: pointer;
    margin-left: 6px;
    vertical-align: middle;
    transition: all 0.2s;
    border: none;
  }
  .speaker-icon:hover { background: var(--accent); color: white; transform: scale(1.1); }
  .speaker-icon.playing { background: var(--accent); color: white; animation: pulse 0.8s infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  .card-pack { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .card-pack .card {
    background: var(--card-hover);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 1.3rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-pack .card:hover { border-color: var(--accent); transform: scale(1.05); }
  .card-pack .card.flipped { background: var(--accent); color: white; border-color: var(--accent); }

  .word-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .word-list .word {
    background: var(--card-hover);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .word-list .word:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .word-list .word.highlighted { background: var(--green-dark); color: white; border-color: var(--green); }

  .sentences-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .sentences-list .sentence {
    background: var(--card-hover);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 1.1rem;
    line-height: 1.6;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sentences-list .sentence:hover { border-color: var(--accent); }
  .sentences-list .sentence .highlight { color: var(--accent-light); font-weight: 700; }

  .irregular-words { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .irregular-words .iw {
    background: linear-gradient(135deg, #3b1f5e, #2d1a4e);
    border: 1px solid #6c3faa;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 1.2rem;
    font-weight: 700;
    color: #c4a6f5;
    cursor: pointer;
    transition: all 0.2s;
  }
  .irregular-words .iw:hover { transform: scale(1.05); border-color: #8b5fcf; }

  /* EXTENSIONS */
  .extensions-section {
    background: linear-gradient(135deg, #1a2520, #1a2d25);
    border: 1px solid #2d6b4a;
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .extensions-section h3 { color: var(--green); font-size: 1rem; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .extensions-section .ext-label {
    font-size: 0.8rem;
    color: var(--green);
    opacity: 0.7;
    margin-bottom: 12px;
  }
  .extensions-section .word-list .word {
    background: rgba(52,211,153,0.1);
    border-color: rgba(52,211,153,0.3);
  }
  .extensions-section .word-list .word:hover {
    background: var(--green-dark);
    border-color: var(--green);
  }

  /* GAMES TAB */
  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .game-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
  .game-card p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 16px; }

  .match-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
  }
  .match-card {
    background: var(--card-hover);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .match-card:hover { border-color: var(--accent); }
  .match-card.selected { border-color: var(--accent); background: rgba(108,99,255,0.15); }
  .match-card.matched { border-color: var(--green); background: rgba(52,211,153,0.15); color: var(--green); pointer-events: none; }
  .match-card.wrong { border-color: var(--red); background: rgba(248,113,113,0.1); animation: shake 0.3s; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .blend-game { display: flex; flex-direction: column; gap: 16px; }
  .blend-sounds {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  .blend-sounds .sound-block {
    background: var(--accent);
    color: white;
    padding: 16px 24px;
    border-radius: 10px;
    font-size: 1.6rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .blend-sounds .sound-block:hover { transform: scale(1.1); }
  .blend-sounds .plus { font-size: 1.4rem; color: var(--text-dim); }
  .blend-answer { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .blend-answer button {
    background: var(--card-hover);
    border: 2px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .blend-answer button:hover { border-color: var(--accent); }
  .blend-answer button.correct { border-color: var(--green); background: rgba(52,211,153,0.15); color: var(--green); }
  .blend-answer button.wrong { border-color: var(--red); background: rgba(248,113,113,0.1); }

  .sort-game { display: flex; flex-direction: column; gap: 16px; }
  .sort-buckets { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .sort-bucket {
    background: var(--card-hover);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 16px;
    min-height: 120px;
    text-align: center;
    transition: all 0.2s;
  }
  .sort-bucket.drop-hover { border-color: var(--accent); background: rgba(108,99,255,0.05); }
  .sort-bucket h4 { font-size: 1.2rem; margin-bottom: 12px; color: var(--accent); }
  .sort-bucket .dropped-words { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .sort-bucket .dropped-word {
    background: var(--green-dark);
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: 600;
  }
  .sort-bucket .dropped-word.wrong-sort {
    background: var(--red);
  }
  .sort-words { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .sort-words button {
    background: var(--card-hover);
    border: 2px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .sort-words button:hover { border-color: var(--accent); transform: translateY(-2px); }
  .sort-words button.sorted { opacity: 0.3; pointer-events: none; }

  .game-score {
    text-align: center;
    padding: 12px;
    background: var(--card-hover);
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--green);
  }

  /* MISSING LETTER GAME */
  .missing-letter-display {
    text-align: center;
    padding: 24px;
  }
  .missing-letter-display .ml-word {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: 6px;
    margin-bottom: 16px;
  }
  .missing-letter-display .ml-word .blank {
    display: inline-block;
    width: 40px;
    border-bottom: 4px solid var(--accent);
    margin: 0 2px;
    color: transparent;
  }
  .missing-letter-display .ml-word .blank.filled {
    color: var(--green);
    border-color: var(--green);
  }
  .ml-options { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .ml-options button {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--card-hover);
    color: var(--text);
    font-size: 1.4rem;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .ml-options button:hover { border-color: var(--accent); transform: scale(1.1); }
  .ml-options button.correct { border-color: var(--green); background: rgba(52,211,153,0.2); color: var(--green); }
  .ml-options button.wrong { border-color: var(--red); background: rgba(248,113,113,0.1); color: var(--red); }

  /* DICTATION TAB */
  .dictation-area {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .dictation-area h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
  .dictation-area > p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px; }
  .dictation-word-display {
    text-align: center;
    padding: 24px;
    margin-bottom: 20px;
  }
  .dictation-word-display .prompt { font-size: 1rem; color: var(--text-dim); margin-bottom: 8px; }
  .dictation-word-display .current-word {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--accent-light);
    cursor: pointer;
    user-select: none;
  }
  .dictation-word-display .hint-text { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }

  .speak-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    border: none;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    margin: 8px 0;
    transition: all 0.2s;
  }
  .speak-btn:hover { background: var(--accent-light); transform: scale(1.03); }
  .speak-btn.playing { animation: pulse 0.8s infinite; }

  .dictation-input-area { display: flex; gap: 12px; margin-bottom: 16px; }
  .dictation-input-area input {
    flex: 1;
    background: var(--card-hover);
    border: 2px solid var(--border);
    color: var(--text);
    padding: 14px 18px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 2px;
    outline: none;
  }
  .dictation-input-area input:focus { border-color: var(--accent); }
  .dictation-input-area input.correct { border-color: var(--green); background: rgba(52,211,153,0.1); }
  .dictation-input-area input.wrong { border-color: var(--red); background: rgba(248,113,113,0.05); }
  .dictation-input-area button {
    background: var(--accent);
    border: none;
    color: white;
    padding: 14px 24px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .dictation-input-area button:hover { background: var(--accent-light); }

  .dictation-progress { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .dictation-progress .dot {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--card-hover);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
  }
  .dictation-progress .dot.correct { background: var(--green-dark); border-color: var(--green); color: white; }
  .dictation-progress .dot.wrong { background: rgba(248,113,113,0.2); border-color: var(--red); color: var(--red); }
  .dictation-progress .dot.current { border-color: var(--accent); color: var(--accent); }

  .dictation-results {
    background: var(--card-hover);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    display: none;
  }
  .dictation-results h3 { font-size: 1.3rem; margin-bottom: 8px; }
  .dictation-results .score { font-size: 2.5rem; font-weight: 800; color: var(--green); }
  .dictation-results .retry-btn {
    background: var(--accent);
    border: none;
    color: white;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 12px;
  }

  .mode-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .mode-toggle button {
    background: var(--card-hover);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .mode-toggle button.active { background: var(--accent); color: white; border-color: var(--accent); }

  .hidden-word { filter: blur(12px); transition: filter 0.3s; cursor: pointer; }
  .hidden-word.revealed { filter: blur(0); }

  .awareness-section {
    background: linear-gradient(135deg, #1a1530, #1e1a35);
    border: 1px solid #3b2d6b;
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .awareness-section h3 { color: #c4a6f5; font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
  .awareness-section .type-badge {
    display: inline-block;
    background: rgba(108,63,170,0.3);
    color: #c4a6f5;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

let audioCtx;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function playCorrectSound() { playTone(523, 0.12, 'sine'); setTimeout(() => playTone(659, 0.12, 'sine'), 100); setTimeout(() => playTone(784, 0.2, 'sine'), 200); }

  synth.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = rate || 0.85;
  utter.pitch = 1.0;

  synth.speak(utter);
  return utter;

    's': 'sss', 'e': 'eh'
  };
  speakText(soundMap[phoneme] || phoneme, 0.7);
}

function speakWord(word) { speakText(word, 0.75); }
function speakSentence(sentence) { speakText(sentence, 0.85); }

      <div class="sentences-list" id="extSentences"></div>
    </div>
  `;

  const sentencesEl = document.getElementById('extSentences');
  const extSentences = generateExtensionSentences(L);
  sentencesEl.innerHTML = extSentences.map(s => {
    const escaped = s.replace(/'/g, "\\'");
    const highlighted = s.replace(new RegExp('(' + L.phoneme.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<span class="highlight">$1</span>');
    return `<div class="sentence" onclick="speakSentence('${escaped}')"><button class="speaker-icon" onclick="event.stopPropagation();speakSentence('${escaped}')">&#9835;</button><span>${highlighted}</span></div>`;
  }).join('');
}

function generateExtensionSentences(L) {
  const ext = L.extensions;
  const iw = L.irregularWords;
  const sentences = [];
  const templates = [
    (w) => `The ${w} is on the ${pickRandom(ext, w)}.`,
    (w) => `${capitalize(pickRandom(iw) || 'The')} ${w} got ${pickRandom(ext, w)}.`,
    (w) => `I can ${w} and ${pickRandom(ext, w)}.`,
    (w) => `The big ${w} is not ${pickRandom(ext, w)}.`,
    (w) => `${capitalize(w)} got a ${pickRandom(ext, w)} from the ${pickRandom(ext, w)}.`
  ];
  const usedWords = new Set();
  for (let i = 0; i < Math.min(5, ext.length); i++) {
    let w = ext[i];
    if (usedWords.has(w)) continue;
    usedWords.add(w);
    sentences.push(templates[i % templates.length](w));
  }
  return sentences;
}

function pickRandom(arr, exclude) {
  const filtered = exclude ? arr.filter(x => x !== exclude) : arr;
  return filtered[Math.floor(Math.random() * filtered.length)] || 'it';
}
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

// -- Blend Game --
let blendState = {};
function initBlendGame(words) {
  if (words.length === 0) { document.getElementById('blendGame').innerHTML = '<p style="color:var(--text-dim)">Not enough words yet.</p>'; return; }
  blendState = { words: shuffle([...words]), current: 0, score: 0 };
  renderBlendRound();
}

function renderBlendRound() {
  const container = document.getElementById('blendGame');
  if (!container) return;
  const { words, current, score } = blendState;
  if (current >= words.length) {
    container.innerHTML = `<div class="game-score">Complete! ${score}/${words.length} correct</div>`;
    return;
  }
  const word = words[current];
  const sounds = word.split('');
  let options = [word];
  const pool = [...currentLesson.words, ...currentLesson.extensions.slice(0, 10)].filter(w => w !== word && w.length >= 2);
  while (options.length < Math.min(4, pool.length + 1)) {
    const r = pool[Math.floor(Math.random() * pool.length)];
    if (r && !options.includes(r)) options.push(r);
  }
  options = shuffle(options);

  container.innerHTML = `
    <div class="blend-game">
      <div class="blend-sounds">
        ${sounds.map((s, i) => `<span class="sound-block" onclick="speakSound('${s}')">${s}</span>${i < sounds.length - 1 ? '<span class="plus">+</span>' : ''}`).join('')}
      </div>
      <div class="blend-answer">
        ${options.map(o => `<button onclick="checkBlend(this, '${o}', '${word}')">${o}</button>`).join('')}
      </div>
      <div class="game-score">${current + 1} of ${words.length} · Score: ${score}</div>
    </div>
  `;
}

function checkBlend(btn, selected, correct) {
  const isCorrect = selected === correct;
  if (isCorrect) {
    btn.classList.add('correct');
    blendState.score++;
    showFeedback(true);
    speakWord(correct);
  } else {
    btn.classList.add('wrong');
    showFeedback(false);
    btn.parentElement.querySelectorAll('button').forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
  }
  blendState.current++;
  setTimeout(renderBlendRound, 1000);
}

// -- Missing Letter Game --
let mlState = {};
function initMissingLetterGame(words) {
  const container = document.getElementById('missingGame');
  if (!container || words.length === 0) { if (container) container.innerHTML = '<p style="color:var(--text-dim)">Not enough words yet.</p>'; return; }
  mlState = { words: shuffle([...words]), current: 0, score: 0 };
  renderMissingRound();
}

function renderMissingRound() {
  const container = document.getElementById('missingGame');
  if (!container) return;
  const { words, current, score } = mlState;
  if (current >= words.length) {
    container.innerHTML = `<div class="game-score">Complete! ${score}/${words.length} correct</div>`;
    return;
  }
  const word = words[current];
  const missingIdx = Math.floor(Math.random() * word.length);
  const missingLetter = word[missingIdx];
  const display = word.split('').map((c, i) => i === missingIdx ? '<span class="blank">_</span>' : c).join('');

  let options = [missingLetter];
  const allLetters = 'abcdefghijklmnoprstuvwxyz'.split('').filter(l => l !== missingLetter);
  while (options.length < 4) {
    const r = allLetters[Math.floor(Math.random() * allLetters.length)];
    if (!options.includes(r)) options.push(r);
  }
  options = shuffle(options);

  container.innerHTML = `
    <div class="missing-letter-display">
      <div class="ml-word" id="mlWord">${display}</div>
      <div class="ml-options">
        ${options.map(o => `<button onclick="checkMissing(this, '${o}', '${missingLetter}', '${word}')">${o}</button>`).join('')}
      </div>
      <div class="game-score" style="margin-top:16px;">${current + 1} of ${words.length} · Score: ${score}</div>
    </div>
  `;
}

function checkMissing(btn, selected, correct, word) {
  const isCorrect = selected === correct;
  if (isCorrect) {
    btn.classList.add('correct');
    mlState.score++;
    showFeedback(true);
    speakWord(word);
    document.querySelectorAll('#mlWord .blank').forEach(b => { b.textContent = correct; b.classList.add('filled'); });
  } else {
    btn.classList.add('wrong');
    showFeedback(false);
    btn.parentElement.querySelectorAll('button').forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
  }
  mlState.current++;
  setTimeout(renderMissingRound, 1000);
}

// -- Sort Game --
function initSortGame() {
  const container = document.getElementById('sortGame');
  if (!container) return;
  const L = currentLesson;
  const currPhoneme = L.phoneme;

  container.innerHTML = `

}

// -- Builder Game --
function initBuilderGame(allWords) {
  const container = document.getElementById('builderGame');
  if (!container) return;
  const words = (allWords || currentLesson.words).filter(w => w.length >= 2 && w.length <= 4).slice(0, 6);
  if (words.length === 0) { container.innerHTML = '<p style="color:var(--text-dim)">Not enough words yet.</p>'; return; }
  window._builderState = { words: shuffle([...words]), current: 0, score: 0 };
  renderBuilderRound(container);
}

function renderBuilderRound(container) {
  if (!container) container = document.getElementById('builderGame');
  if (!container) return;
  const { words, current, score } = window._builderState;
  if (current >= words.length) {
    container.innerHTML = `<div class="game-score">Complete! ${score}/${words.length} correct</div>`;
    return;
  }
  const word = words[current];
  const letters = word.split('');
  const shuffled = shuffle([...letters]);
  window._builderTarget = word;
  window._builderInput = [];

  container.innerHTML = `
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:0.85rem;color:var(--text-dim);margin-bottom:8px;">Build this word — say each sound as you tap</div>
      <button class="speak-btn" onclick="speakWord('${word}')" style="margin-bottom:12px;">&#9835; Hear the word</button>
      <div id="builderSlots" style="display:flex;gap:6px;justify-content:center;margin-bottom:16px;min-height:50px;">
        ${letters.map(() => '<div style="width:44px;height:44px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;"></div>').join('')}
      </div>
      <div id="builderLetters" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        ${shuffled.map(l => `<button onclick="pickBuilderLetter(this, '${l}')" style="background:var(--accent);border:none;color:white;width:48px;height:48px;border-radius:10px;font-size:1.3rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.15s;">${l}</button>`).join('')}
      </div>
      <div class="game-score" style="margin-top:12px;">${current + 1} of ${words.length} · Score: ${score}</div>
    </div>
  `;
}

function pickBuilderLetter(btn, letter) {
  const target = window._builderTarget;
  const input = window._builderInput;
  const idx = input.length;
  if (idx >= target.length) return;

  input.push(letter);
  btn.style.opacity = '0.3';
  btn.style.pointerEvents = 'none';
  speakSound(letter);

  const slots = document.querySelectorAll('#builderSlots > div');
  slots[idx].textContent = letter;
  slots[idx].style.borderStyle = 'solid';
  slots[idx].style.borderColor = 'var(--accent)';

  if (input.length === target.length) {
    const built = input.join('');
    const correct = built === target;
    if (correct) {
      window._builderState.score++;
      showFeedback(true);
      speakWord(target);
      slots.forEach(s => { s.style.borderColor = 'var(--green)'; s.style.color = 'var(--green)'; });
    } else {
      showFeedback(false);
      slots.forEach(s => { s.style.borderColor = 'var(--red)'; s.style.color = 'var(--red)'; });
    }
    window._builderState.current++;
    setTimeout(() => renderBuilderRound(null), 1200);
  }
}

// ===== DICTATION TAB =====
let dictState = {};
function renderReviewTab() {
  const el = document.getElementById('tab-review');
  const L = currentLesson;

  const allDictation = [...L.dictation];
  if (L.extensions.length > 0) {
    const extWords = L.extensions.slice(0, 5);
    allDictation.push(...extWords);
  }

  if (allDictation.length === 0) {
    el.innerHTML = '<div class="dictation-area"><h3>No dictation words for this lesson</h3></div>';
    return;
  }

  const wordsOnly = allDictation.filter(d => !d.includes(' '));
  const sentencesOnly = allDictation.filter(d => d.includes(' '));

  dictState = { items: [...wordsOnly, ...sentencesOnly], current: 0, results: [], mode: 'audio' };
  renderDictationUI(el);
}

function renderDictationUI(el) {
  if (!el) el = document.getElementById('tab-review');
  const { items, current, results, mode } = dictState;

  if (current >= items.length) {
    const correct = results.filter(r => r).length;
    const pct = Math.round((correct / items.length) * 100);
    el.innerHTML = `
      <div class="dictation-area">
        <div class="dictation-results" style="display:block;">
          <h3>Review Complete!</h3>
          <div class="score">${correct} / ${items.length}</div>
          <p style="color:var(--text-dim);margin-top:4px;">${pct}%</p>
          <p style="color:var(--text-dim);margin-top:8px;">${pct === 100 ? 'Perfect!' : pct >= 70 ? 'Great job! Keep practicing.' : 'Keep working at it!'}</p>
          <button class="retry-btn" onclick="renderReviewTab()">Try Again</button>
        </div>
      </div>
    `;
    return;
  }

  const item = items[current];
  const isSentence = item.includes(' ');
  const escaped = item.replace(/'/g, "\\'");

  el.innerHTML = `
    <div class="dictation-area">
      <h3>Dictation Review</h3>
      <p>Choose a mode: Audio (computer speaks the word), Teacher Dictates (word hidden, teacher reads), or Self Practice (word visible).</p>

      <div class="mode-toggle">
        <button class="${mode === 'audio' ? 'active' : ''}" onclick="dictState.mode='audio';renderDictationUI()">Audio Mode</button>
        <button class="${mode === 'hidden' ? 'active' : ''}" onclick="dictState.mode='hidden';renderDictationUI()">Teacher Dictates</button>
        <button class="${mode === 'visible' ? 'active' : ''}" onclick="dictState.mode='visible';renderDictationUI()">Self Practice</button>
      </div>

      <div class="dictation-word-display">
        ${mode === 'audio' ? `
          <div class="prompt">${isSentence ? 'Listen to the sentence, then type it:' : 'Listen to the word, then type it:'}</div>
          <button class="speak-btn" onclick="speakWord('${escaped}')">&#9835; Play Sound</button>
          <div class="hint-text">Tap to hear it again</div>
        ` : mode === 'hidden' ? `
          <div class="prompt">${isSentence ? 'Dictate this sentence:' : 'Dictate this word:'}</div>
          <div class="current-word hidden-word" onclick="this.classList.toggle('revealed')">${item}</div>
          <div class="hint-text">Tap to reveal / hide</div>
        ` : `
          <div class="prompt">${isSentence ? 'Type this sentence:' : 'Type this word:'}</div>
          <div class="current-word">${item}</div>
        `}
      </div>

      <div class="dictation-input-area">
        <input type="text" id="dictInput" placeholder="Type what you hear..." autocomplete="off" autocapitalize="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkDictation()">
        <button onclick="checkDictation()">Check</button>
      </div>

      <div class="dictation-progress">
        ${items.map((_, i) => {
          let cls = '';
          if (i < current) cls = results[i] ? 'correct' : 'wrong';
          else if (i === current) cls = 'current';
          return '<div class="dot ' + cls + '">' + (i + 1) + '</div>';
        }).join('')}
      </div>
    </div>
  `;

  setTimeout(() => {
    const inp = document.getElementById('dictInput');
    if (inp) inp.focus();
    if (mode === 'audio') speakWord(item);
  }, 200);
}

function checkDictation() {
  const input = document.getElementById('dictInput');
  const answer = input.value.trim().toLowerCase().replace(/[.,!?"]/g, '');
  const correct = dictState.items[dictState.current].toLowerCase().replace(/[.,!?"]/g, '');
  const isCorrect = answer === correct;
  dictState.results.push(isCorrect);

  if (isCorrect) {
    input.classList.add('correct');
    showFeedback(true);
  } else {
    input.classList.add('wrong');
    showFeedback(false);
    setTimeout(() => { input.value = dictState.items[dictState.current]; input.classList.remove('wrong'); input.classList.add('correct'); }, 400);
  }

  dictState.current++;
  setTimeout(() => renderDictationUI(), isCorrect ? 600 : 2000);
}

// ===== UTILS =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Preload voices
if (synth) synth.onvoiceschanged = () => synth.getVoices();

renderDashboard();
</script>
